<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>金山道院數位學習網</title>

  <meta name="theme-color" content="#198754" />
  <meta name="description" content="金山道院數位學習網，提供課程瀏覽、搜尋與資料維護功能。" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <!-- Bootstrap 5.3.8 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome 7 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    body { background: #f8f9fa; }
    .object-fit-cover { object-fit: cover; }

    .install-bar {
      position: sticky;
      top: 56px;
      z-index: 1020;
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="./index.html">
        <i class="fa-solid fa-mountain-sun me-2"></i>金山道院數位學習網
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="./index.html">
              <i class="fa-solid fa-house me-1"></i>首頁
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="./create.html">
              <i class="fa-solid fa-pen-to-square me-1"></i>資料維護
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- PWA 安裝提示 -->
  <div id="installBar" class="install-bar bg-success-subtle border-bottom d-none">
    <div class="container py-2 d-flex flex-wrap align-items-center justify-content-between gap-2">
      <div class="small">
        <i class="fa-solid fa-mobile-screen-button me-1"></i>
        可將此網站安裝到桌面 / 主畫面，方便快速開啟。
      </div>
      <div class="d-flex gap-2">
        <button id="buttonInstall" class="btn btn-success btn-sm" type="button">
          <i class="fa-solid fa-download me-1"></i>安裝 App
        </button>
        <button id="buttonInstallClose" class="btn btn-outline-secondary btn-sm" type="button">
          稍後
        </button>
      </div>
    </div>
  </div>

  <main class="container py-4">
    <!-- Filters -->
    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-12 col-lg-4">
            <label class="form-label">
              <i class="fa-solid fa-magnifying-glass me-1"></i>搜尋
            </label>
            <input id="searchText" type="text" class="form-control" placeholder="輸入關鍵字：課程/班期/地點/主講者...">
          </div>

          <div class="col-12 col-lg-3">
            <label class="form-label">
              <i class="fa-solid fa-filter me-1"></i>篩選班期
            </label>
            <select id="classFilter" class="form-select">
              <option value="">全部班期</option>
            </select>
          </div>

          <div class="col-12 col-lg-5">
            <label class="form-label">
              <i class="fa-regular fa-calendar-days me-1"></i>篩選日期
            </label>
            <div class="row g-2">
              <div class="col-6">
                <input id="dateFrom" type="date" class="form-control">
              </div>
              <div class="col-6">
                <input id="dateTo" type="date" class="form-control">
              </div>
            </div>
          </div>

          <div class="col-12 d-flex gap-2">
            <button id="buttonClear" class="btn btn-outline-secondary btn-sm">
              <i class="fa-solid fa-eraser me-1"></i>清除條件
            </button>
            <span id="resultInfo" class="small text-secondary align-self-center"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Cards -->
    <div id="cardsRow" class="row g-3"></div>

    <!-- Empty -->
    <div id="emptyState" class="text-center text-secondary py-5 d-none">
      <i class="fa-regular fa-folder-open fa-2x mb-2"></i>
      <div class="fw-semibold">目前沒有符合條件的課程</div>
      <div class="small">你可以到「資料維護」新增課程資料</div>
    </div>
  </main>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script src="./pwa.js"></script>
  <script src="./badge.js"></script>
  <script src="./card.js"></script>
  <script src="./index.js"></script>
</body>
</html>
